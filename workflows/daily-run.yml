name: Daily Java Task
on:
  schedule:
    - cron: '0 8 * * *' # Runs at 08:00 UTC
  workflow_dispatch:

jobs:
  run-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Run Java JAR
        env:
          PUSHCUT_EXECUTE_URL: ${{ secrets.PUSHCUT_EXECUTE_URL }}
        run: java -jar your-app.jar
