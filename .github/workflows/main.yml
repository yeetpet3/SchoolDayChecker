name: Daily School Task
on:
  schedule:
    - cron: '15 12 * * 1-5'
  workflow_dispatch: # Still allows you to run it manually for testing

jobs:
  run-java:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: List files (Debug)
        run: ls -R  # This prints every file and folder in the repo
      # Compiles the Java file fresh every time
      - name: Compile Java
        run: javac Main1.java   
      # Runs the compiled class
      - name: Run Java
        run: java Main1
      
      - name: Debug and Verify
        run: |
          echo "File content is:"
          cat school_update.txt
      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -f school_update.txt
          if git diff --quiet && git diff --staged --quiet; then
              echo "No changes to commit."
          else
              git commit -m "Update daily school task"
              git push
          fi
    
        env:
          PUSHCUT_WEBHOOK_URL: ${{secrets.THING_HELLO}}
       
