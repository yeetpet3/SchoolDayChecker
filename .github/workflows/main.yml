name: Daily School Task
on:
  schedule:
    # 12:15 UTC is 07:15 EST
    - cron: '15 12 * * *'
  workflow_dispatch: # Still allows you to run it manually for testing

jobs:
  run-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      # Compiles the Java file fresh every time
      - name: Compile Java
        run: javac Main1.java
        
      # Runs the compiled class
      - name: Run Java
        env:
          PUSHCUT_WEBHOOK_URL: ${{ secrets.PUSHCUT_WEBHOOK_URL }}
        run: java Main1
