name: Daily Java Task
on:
  schedule:
    - cron: '15 0 * * *' # Runs at 12:15 UTC
  workflow_dispatch:

jobs:
  run-java:
    runs-on: ubuntu-latest
    steps:
      - name: Run Java
        env:
          PUSHCUT_WEBHOOK_URL: ${{ secrets.PUSHCUT_WEBHOOK_URL }}
        run: java -cp Main1.jar Main1
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Run Java JAR
        env:
          PUSHCUT_EXECUTE_URL: ${{ secrets.PUSHCUT_EXECUTE_URL }}
        run: java -jar Main1.jar
